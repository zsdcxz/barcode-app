<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0078d4">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<title>Service Tag Barcode v2.6</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.6/JsBarcode.all.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.1/tesseract.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@undecaf/zbar-wasm@0.11.0/dist/inlined/index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:#111;color:#e0e0e0;
  min-height:100vh;min-height:100dvh;overflow-x:hidden;padding-bottom:80px}

/* 헤더 */
.hdr{background:#0078d4;padding:14px 20px;display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:100}
.hdr h1{font-size:16px;font-weight:600;color:#fff;flex:1}
.hdr .tag{font-size:10px;background:rgba(255,255,255,.2);padding:2px 8px;border-radius:10px;color:rgba(255,255,255,.8)}

.wrap{max-width:500px;margin:0 auto;padding:16px}

/* 네비게이션 탭 */
.nav{display:flex;background:#1a1a1a;border-radius:14px;padding:4px;margin-bottom:20px;gap:0}
.nav button{flex:1;padding:11px 4px;font-size:12px;background:transparent;color:#666;border:none;
  border-radius:11px;cursor:pointer;font-weight:500;transition:.2s}
.nav button.on{background:#0078d4;color:#fff}

.page{display:none}.page.on{display:block}

/* 공통 버튼 */
.btn{padding:13px 22px;font-size:14px;background:#0078d4;color:#fff;border:none;border-radius:12px;
  cursor:pointer;font-weight:600;transition:.15s}
.btn:active{transform:scale(.96);opacity:.9}
.btn-s{padding:9px 16px;font-size:12px;background:#252525;color:#bbb;border:1px solid #444;
  border-radius:10px;cursor:pointer;transition:.2s}
.btn-s:active{background:#333}
.btn-full{width:100%}

/* 포맷 */
.fmts{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.fm{padding:7px 14px;font-size:11px;background:#1a1a1a;color:#777;border:1px solid #333;
  border-radius:8px;cursor:pointer;transition:.2s}
.fm.on{background:#0078d4;color:#fff;border-color:#0078d4}

/* 입력 */
.irow{display:flex;gap:10px;margin-bottom:18px}
.irow input{flex:1;padding:13px 14px;font-size:18px;font-family:Consolas,monospace;
  background:#1a1a1a;border:2px solid #333;border-radius:12px;color:#fff;
  letter-spacing:3px;text-transform:uppercase;outline:none}
.irow input:focus{border-color:#0078d4}
.irow input::placeholder{color:#444;letter-spacing:1px;text-transform:none;font-size:14px}

/* 바코드 카드 */
.bc-card{background:#fff;border-radius:14px;padding:24px 16px;text-align:center;
  box-shadow:0 6px 28px rgba(0,0,0,.5);margin-bottom:14px}
.bc-card svg{display:block;margin:0 auto;max-width:100%}
.bc-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}

/* 권한 안내 */
.perm-box{background:#1e1e1e;border:1px solid #333;border-radius:14px;padding:28px 20px;
  text-align:center;margin-bottom:20px}
.perm-box .icon{font-size:48px;margin-bottom:14px}
.perm-box p{color:#999;font-size:14px;line-height:1.6;margin-bottom:16px}
.perm-box .note{font-size:12px;color:#666;margin-top:12px}

/* 스캔 영역 — 일반 카메라 앱처럼 크게 */
#scanZone{width:100%;border-radius:14px;overflow:hidden;margin-bottom:12px;
  height:70vh;max-height:640px;background:#000;position:relative}
#scanZone video{width:100%!important;height:100%!important;object-fit:cover;border-radius:14px}
/* html5-qrcode가 삽입하는 내부 요소도 꽉 채우기 */
#scanZone>div{border:none!important}
#scanZone>div>video{width:100%!important;height:100%!important;object-fit:cover}
/* 전면 카메라는 거울처럼 좌우 반전 */
#scanZone.mirrored video{transform:scaleX(-1)}

/* 스캔 결과 — 이미지 크게 + 값 오버레이 */
.scan-result{background:#1a1a1a;border:1px solid #333;border-radius:14px;
  margin-bottom:16px;overflow:hidden}
.scan-snap-wrap{position:relative;width:100%;cursor:pointer}
.scan-snap-wrap img{width:100%;max-height:55vh;object-fit:cover;display:block;border-radius:0}
.scan-snap-wrap .snap-overlay{position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,.85));padding:16px 14px 12px}
.scan-snap-wrap .snap-hint{font-size:10px;color:rgba(255,255,255,.45);text-align:right;margin-bottom:4px}
.scan-snap-no-img{padding:30px 16px;text-align:center;font-size:32px;color:#333}
.scan-result .val{font-family:Consolas,monospace;font-size:22px;color:#fff;
  letter-spacing:2px;word-break:break-all;font-weight:700}
.scan-result .type{font-size:11px;color:rgba(255,255,255,.5);text-transform:uppercase;margin-top:2px}
.scan-result-btns{padding:12px 14px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}

/* OCR 영역 */
.ocr-upload{border:2px dashed #333;border-radius:14px;padding:32px 16px;text-align:center;
  cursor:pointer;margin-bottom:16px;transition:.2s;position:relative}
.ocr-upload:active{border-color:#0078d4;background:rgba(0,120,212,.04)}
.ocr-upload input{position:absolute;inset:0;opacity:0;cursor:pointer}
.ocr-upload .icon{font-size:36px;margin-bottom:10px}
.ocr-upload p{color:#777;font-size:14px}
.ocr-upload .sub{color:#555;font-size:11px;margin-top:6px}

/* 글자 OCR 토글 스위치 */
.ocr-toggle{display:flex;align-items:center;justify-content:space-between;gap:12px;
  background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:12px 14px;margin-bottom:16px}
.ocr-toggle .ot-title{font-size:14px;color:#ddd;font-weight:600}
.ocr-toggle .ot-sub{font-size:11px;color:#666;margin-top:3px}
.switch{position:relative;display:inline-block;width:48px;height:28px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.switch .slider{position:absolute;inset:0;background:#444;border-radius:28px;transition:.2s;cursor:pointer}
.switch .slider:before{content:"";position:absolute;height:22px;width:22px;left:3px;bottom:3px;
  background:#fff;border-radius:50%;transition:.2s}
.switch input:checked+.slider{background:#0078d4}
.switch input:checked+.slider:before{transform:translateX(20px)}

/* 인식 실패 사진 모음 */
.fail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.fail-cell{background:#1a1a1a;border:1px solid #3a2a2a;border-radius:10px;overflow:hidden}
.fail-cell img{width:100%;height:90px;object-fit:cover;display:block;cursor:pointer;background:#111}
.fail-cell .fail-name{font-size:10px;color:#888;padding:4px 6px;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.fail-hint{font-size:12px;color:#888;margin-top:10px;line-height:1.5}

/* 연속 합치기 모드 패널 */
#multiPanel{background:#1a1a1a;border:1px solid #0078d4;border-radius:12px;
  padding:12px 14px;margin-bottom:14px}
.multi-bar{display:flex;align-items:center;justify-content:space-between;gap:8px;
  font-size:12px;color:#bbb;margin-bottom:10px;flex-wrap:wrap}
.multi-bar #multiCount{color:#0078d4;font-weight:700}
.multi-sep-wrap{display:flex;align-items:center;gap:6px;font-size:11px;color:#888}
.multi-sep-wrap select{background:#252525;color:#ddd;border:1px solid #444;
  border-radius:8px;padding:5px 8px;font-size:12px}
#multiList .chip .x{color:#e85050;font-weight:700;margin-left:2px}
.multi-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.multi-empty{font-size:12px;color:#555}

/* 합치기 공용 행(바코드생성/사진OCR 탭) */
.merge-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:10px}
.merge-row .ms-label{font-size:11px;color:#888}
.merge-row select{background:#252525;color:#ddd;border:1px solid #444;
  border-radius:8px;padding:7px 9px;font-size:12px}
.fail-fix{width:100%;border-radius:0 0 9px 9px;border:none;border-top:1px solid #333;
  font-size:11px;padding:7px 4px}

/* 수동 문서보정 에디터 */
#docEditor{position:fixed;inset:0;background:#000;z-index:600;display:none;flex-direction:column}
#docEditor.open{display:flex}
#docEditor .de-bar{display:flex;align-items:center;gap:8px;padding:12px 14px;background:rgba(0,0,0,.7)}
#docEditor .de-title{flex:1;font-size:13px;color:#ddd;text-align:center}
#docEditor .de-go{background:#0078d4!important}
#docEditor .de-presets{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;
  padding:8px 12px;background:rgba(0,0,0,.5)}
.de-stage.placing{cursor:crosshair}
/* 보정/스캔 진행 스피너 오버레이 */
#deBusy{position:absolute;inset:0;display:none;flex-direction:column;gap:14px;
  align-items:center;justify-content:center;background:rgba(0,0,0,.55);z-index:5}
#deBusy.on{display:flex}
.de-spin{width:54px;height:54px;border:5px solid rgba(255,255,255,.25);
  border-top-color:#0078d4;border-radius:50%;animation:despin 0.8s linear infinite}
@keyframes despin{to{transform:rotate(360deg)}}
.de-busy-text{color:#fff;font-size:14px;font-weight:600}
/* 보정 결과 미리보기(디버그) */
#dePreview{position:absolute;inset:0;display:none;flex-direction:column;
  background:rgba(0,0,0,.92);z-index:6;padding:12px}
#dePreview.on{display:flex}
#dePreview .dp-head{color:#fff;font-size:13px;text-align:center;padding:6px 0 10px}
#dePreview .dp-imgwrap{flex:1;display:flex;align-items:center;justify-content:center;
  overflow:auto;background:#222;border-radius:8px}
#dePreview .dp-imgwrap img{max-width:100%;max-height:100%;object-fit:contain;background:#fff}
#dePreview .dp-btns{display:flex;gap:8px;justify-content:center;padding-top:10px}
.de-stage{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;touch-action:none}
.de-stage img{max-width:100%;max-height:100%;object-fit:contain;display:block;-webkit-user-select:none;user-select:none;pointer-events:none}
.de-stage svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.de-stage #dePoly{fill:rgba(0,120,212,.18);stroke:#0078d4;stroke-width:2}
.de-handle{position:absolute;width:30px;height:30px;margin:-15px 0 0 -15px;border-radius:50%;
  background:rgba(0,120,212,.35);border:2px solid #0078d4;box-shadow:0 0 0 2px rgba(255,255,255,.5);
  touch-action:none;cursor:grab}

/* 인식 실패 모음 */
.fail-sep{font-size:13px;color:#e8a050;margin:20px 0 10px;padding-top:16px;
  border-top:1px solid #333;display:flex;align-items:center;gap:6px}
.fail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.fail-grid .fg-item{position:relative;border-radius:8px;overflow:hidden;background:#000;aspect-ratio:1}
.fail-grid .fg-item img{width:100%;height:100%;object-fit:cover;cursor:pointer;display:block}
.fail-grid .fg-item .fg-x{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.6);
  color:#fff;border:none;border-radius:6px;width:22px;height:22px;font-size:12px;cursor:pointer;line-height:1}

.ocr-queue{margin-bottom:16px}
.oq-item{background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:12px 14px;
  margin-bottom:8px;display:flex;align-items:center;gap:12px}
.oq-item img{width:48px;height:48px;object-fit:cover;border-radius:6px}
.oq-item .info{flex:1;min-width:0}
.oq-item .name{font-size:13px;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.oq-item .status{font-size:11px;color:#666;margin-top:2px}
.oq-item .result{font-family:Consolas,monospace;font-size:14px;color:#0078d4;margin-top:4px;cursor:pointer}
.oq-item .result:active{text-decoration:underline}

.chip-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;
  background:#252525;border:1px solid #444;border-radius:8px;cursor:pointer;
  font-family:Consolas,monospace;font-size:14px;color:#ddd;transition:.2s}
.chip:active,.chip.sel{border-color:#0078d4;background:rgba(0,120,212,.15);color:#fff}
.chip .c{font-size:9px;color:#555;background:#1a1a1a;padding:1px 5px;border-radius:3px}

/* 진행 */
.prog{width:100%;height:5px;background:#282828;border-radius:3px;overflow:hidden;margin:10px 0}
.prog .bar{height:100%;background:#0078d4;border-radius:3px;transition:width .3s;width:0}
.ptext{font-size:12px;color:#666;text-align:center}

/* 일괄 */
.sep{font-size:12px;color:#555;margin:24px 0 10px;padding-top:18px;border-top:1px solid #222}
textarea{width:100%;height:90px;padding:12px;font-family:Consolas,monospace;font-size:13px;
  background:#1a1a1a;border:2px solid #333;border-radius:12px;color:#fff;outline:none;
  resize:vertical;margin-bottom:10px}
textarea::placeholder{color:#444}

.multi-card{background:#fff;border-radius:12px;padding:18px 14px;margin-bottom:10px;
  text-align:center;box-shadow:0 3px 14px rgba(0,0,0,.4);overflow:hidden}
.multi-card svg{display:block;margin:0 auto;max-width:100%;height:auto}

/* 저장 내역 */
.hist-empty{text-align:center;color:#555;padding:40px 0;font-size:14px}
.hist-item{background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:14px;
  margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
.hist-item img{width:72px;height:72px;object-fit:cover;border-radius:8px;flex-shrink:0;
  background:#111;cursor:pointer}
.hist-item .hi-body{flex:1;min-width:0}
.hist-item .hi-val{font-family:Consolas,monospace;font-size:18px;color:#0078d4;
  letter-spacing:2px;word-break:break-all;cursor:pointer}
.hist-item .hi-val:active{text-decoration:underline}
.hist-item .hi-meta{font-size:11px;color:#555;margin-top:4px}
.hist-item .hi-type{font-size:10px;color:#444;text-transform:uppercase;margin-top:2px}
.hist-item .hi-btns{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
/* 인라인 바코드: 너비=박스 가득, 높이=버튼 크기 */
.hist-item .hi-bc-box{margin-top:8px;background:#fff;border-radius:6px;padding:4px 6px}
.hist-item .hi-bc{display:block;width:100%;height:38px}
.hist-item .hi-bc-err{font-size:11px;color:#888;text-align:center}
.hist-clear{display:flex;justify-content:flex-end;margin-bottom:12px}

/* 이미지 풀스크린 오버레이 */
#imgOverlay{position:fixed;inset:0;background:#000;z-index:500;
  display:none;flex-direction:column}
#imgOverlay.open{display:flex}
#imgOverlay .ov-bar{display:flex;align-items:center;gap:10px;padding:14px 16px;
  background:rgba(0,0,0,.6);position:absolute;top:0;left:0;right:0;z-index:1}
#imgOverlay .ov-back{background:rgba(255,255,255,.15);border:none;color:#fff;
  font-size:18px;padding:6px 14px;border-radius:10px;cursor:pointer}
#imgOverlay .ov-label{font-family:Consolas,monospace;font-size:15px;color:#fff;
  flex:1;letter-spacing:1px;word-break:break-all}
#imgOverlay .ov-img-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:auto}
#imgOverlay .ov-img-wrap img{max-width:100%;max-height:100%;object-fit:contain}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;
  color:#fff;padding:10px 24px;border-radius:10px;font-size:13px;z-index:900;
  opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* 설치 배너 */
.inst{position:fixed;bottom:0;left:0;right:0;background:#0078d4;color:#fff;
  padding:12px 16px;display:none;align-items:center;justify-content:space-between;z-index:200;font-size:13px}
.inst button{background:#fff;color:#0078d4;border:none;padding:8px 18px;border-radius:8px;
  font-weight:600;cursor:pointer}
.inst .x{background:transparent;color:rgba(255,255,255,.7);padding:6px;font-size:18px}
</style>
</head>
<body>

<div class="hdr">
  <h1>Service Tag Barcode</h1>
  <span class="tag" id="verTag" style="cursor:pointer" onclick="checkUpdate()" title="탭하면 업데이트 확인">v4.8</span>
  <span class="tag" id="connTag">OFFLINE</span>
</div>

<div class="wrap">
  <!-- 네비게이션 -->
  <div class="nav">
    <button class="on" onclick="go('gen',this)">바코드 생성</button>
    <button onclick="go('scan',this)">QR/바코드 스캔</button>
    <button onclick="go('hist',this)" id="navHist">저장 내역</button>
    <button onclick="go('ocr',this)">사진 OCR</button>
  </div>

  <!-- ========== 1. 바코드 생성 ========== -->
  <div class="page on" id="pg-gen">
    <div class="fmts">
      <button class="fm on" data-f="CODE128" onclick="sf(this)">Code 128</button>
      <button class="fm" data-f="CODE39" onclick="sf(this)">Code 39</button>
      <button class="fm" data-f="codabar" onclick="sf(this)">Codabar</button>
      <button class="fm" data-f="QR" onclick="sf(this)">QR코드</button>
    </div>
    <div class="irow">
      <input type="text" id="tagIn" placeholder="Service Tag 입력">
      <button class="btn" onclick="mkBC()">생성</button>
    </div>
    <div id="bcOut"></div>

    <div class="sep">일괄 생성 (줄바꿈 구분)</div>
    <textarea id="batchIn" placeholder="BJ22XF3&#10;ABC1234&#10;XYZ5678"></textarea>
    <button class="btn btn-full" onclick="mkBatch()">일괄 생성 (각각 1개씩)</button>

    <div class="merge-row">
      <span class="ms-label">구분자</span>
      <select id="genMergeSep">
        <option value="\r">엔터 CR(엑셀 행)</option>
        <option value="\r\n">CRLF</option>
        <option value="\n">줄바꿈 LF</option>
        <option value="\t">탭(다음 칸)</option>
        <option value="|">| (막대)</option>
        <option value=",">, (쉼표)</option>
        <option value=" ">공백</option>
        <option value="">붙여쓰기</option>
      </select>
      <button class="btn-s" onclick="mergeFromBatch('CODE128')">합쳐서 바코드</button>
      <button class="btn-s" onclick="mergeFromBatch('QR')">합쳐서 QR코드</button>
    </div>
  </div>

  <!-- ========== 2. QR/바코드 스캔 ========== -->
  <div class="page" id="pg-scan">
    <!-- 연속 합치기 모드 -->
    <div class="ocr-toggle">
      <div class="ot-text">
        <div class="ot-title">연속 합치기 모드</div>
        <div class="ot-sub">여러 개를 연속 스캔해 하나의 바코드로 합칩니다</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="multiSwitch" onchange="toggleMultiMode(this.checked)">
        <span class="slider"></span>
      </label>
    </div>
    <!-- 합치기 모드 수집 패널 -->
    <div id="multiPanel" style="display:none">
      <div class="multi-bar">
        <span id="multiCount">0개 수집됨</span>
        <span class="multi-sep-wrap">구분자:
          <select id="multiSep" onchange="renderMultiList()">
            <option value="\r">엔터 CR(엑셀 행)</option>
            <option value="\r\n">CRLF</option>
            <option value="\n">줄바꿈 LF</option>
            <option value="\t">탭(다음 칸)</option>
            <option value="|">| (막대)</option>
            <option value=",">, (쉼표)</option>
            <option value=" ">공백</option>
            <option value="">붙여쓰기</option>
          </select>
        </span>
      </div>
      <div id="multiList" class="chip-list"></div>

<script>
// ===== 전역 =====
let fmt='CODE128', scanner=null, deferP=null, camFacing='environment', scanLocked=false;
let ocrUseText=false;   // 글자 OCR 사용 여부(기본 OFF) — 토글 스위치로 제어
const ocrFiles=[];
// 연속 합치기 모드
let multiMode=false;
let multiList=[];
let multiCooldown=false;  // 같은 코드 연속 재인식 방지용 짧은 잠금

// ===== 저장 내역 (localStorage) =====
const HIST_KEY='bc_history';
function loadHist(){ try{return JSON.parse(localStorage.getItem(HIST_KEY)||'[]');}catch(e){return[];} }
function saveHist(arr){ localStorage.setItem(HIST_KEY,JSON.stringify(arr)); }

function addHist(value, type, snap){
  const arr=loadHist();
  // 같은 값이 이미 있으면 최신으로 업데이트
  const idx=arr.findIndex(x=>x.value===value);
  const item={id:Date.now(),value,type,date:new Date().toISOString(),snap:snap||null};
  if(idx>=0) arr.splice(idx,1);
  arr.unshift(item);
  if(arr.length>200) arr.length=200; // 최대 200개
  saveHist(arr);
  updateHistBadge();
}

function deleteHist(id){
  const arr=loadHist().filter(x=>x.id!==id);
  saveHist(arr);
  renderHist();
  updateHistBadge();
}

function clearAllHist(){
  if(!confirm('저장된 내역을 모두 삭제하시겠습니까?')) return;
  saveHist([]);
  renderHist();
  updateHistBadge();
  toast('전체 삭제됨');
}

function updateHistBadge(){
  const arr=loadHist();
  const btn=document.getElementById('navHist');
  btn.textContent=arr.length?'저장 내역 ('+arr.length+')':'저장 내역';
}

function renderHist(){
  const arr=loadHist();
  const el=document.getElementById('histList');
  if(!arr.length){
    el.innerHTML='<div class="hist-empty">저장된 내역이 없습니다<br><span style="font-size:24px;margin-top:12px;display:block">📭</span></div>';
    return;
  }
  el.innerHTML='';
  arr.forEach(item=>{
    const d=new Date(item.date);
    const dateStr=d.getFullYear()+'.'+(d.getMonth()+1).toString().padStart(2,'0')+'.'+
      d.getDate().toString().padStart(2,'0')+' '+d.getHours().toString().padStart(2,'0')+':'+
      d.getMinutes().toString().padStart(2,'0');
    const div=document.createElement('div');
    div.className='hist-item';
    const imgHtml=item.snap
      ? '<img src="'+item.snap+'" alt="캡처" onclick="showImg('+item.id+')">'
      : '<div style="width:72px;height:72px;border-radius:8px;background:#222;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0">📷</div>';
    div.innerHTML=
      imgHtml+
      '<div class="hi-body">'+
        '<div class="hi-val" onclick="histToBarcode(\''+escHtml(item.value)+'\')">'+escHtml(item.value)+'</div>'+
        '<div class="hi-type">'+escHtml(item.type||'')+'</div>'+
        '<div class="hi-meta">'+dateStr+'</div>'+
        '<div class="hi-bc-box"><svg class="hi-bc" id="hbc_'+item.id+'"></svg></div>'+
        '<div class="hi-btns">'+
          '<button class="btn-s" onclick="histCopy(\''+escHtml(item.value)+'\')">복사</button>'+
          '<button class="btn-s" style="color:#e85050;border-color:#e85050" onclick="deleteHist('+item.id+')">삭제</button>'+
        '</div>'+
      '</div>';
    el.appendChild(div);
  });
  // 각 항목 바코드 인라인 렌더(높이=버튼 크기, 너비=박스 가득)
  arr.forEach(item=>{
    try{
      JsBarcode('#hbc_'+item.id,item.value,{format:'CODE128',width:2,height:36,
        displayValue:false,margin:0,background:'#fff',lineColor:'#000'});
    }catch(e){
      const svg=document.getElementById('hbc_'+item.id);
      if(svg) svg.outerHTML='<div class="hi-bc-err">바코드 생성 불가</div>';
    }
  });
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function histToBarcode(val){
  document.getElementById('tagIn').value=val;
  go('gen',document.querySelectorAll('.nav button')[0]);
  mkBC();
  toast('바코드 생성됨: '+val);
}

function histCopy(val){
  navigator.clipboard.writeText(val).then(()=>toast('복사됨: '+val));
}

// ===== 이미지 오버레이 (뒤로가기 지원) =====
function openOverlay(src, label){
  document.getElementById('overlayImg').src=src;
  document.getElementById('overlayLabel').textContent=label||'';
  document.getElementById('imgOverlay').classList.add('open');
  // 뒤로가기로 닫을 수 있도록 history 스택에 추가
  history.pushState({overlay:true},'');
}

function closeOverlay(){
  document.getElementById('imgOverlay').classList.remove('open');
  document.getElementById('overlayImg').src='';
  // history.back()이 이 함수를 호출했을 수도 있으므로 state 확인 후 pop
  if(history.state&&history.state.overlay) history.back();
}

// 뒤로가기 버튼(Android 물리/제스처) 감지
window.addEventListener('popstate', e=>{
  if(document.getElementById('imgOverlay').classList.contains('open')){
    document.getElementById('imgOverlay').classList.remove('open');
    document.getElementById('overlayImg').src='';
  }
  const ed=document.getElementById('docEditor');
  if(ed && ed.classList.contains('open')){
    ed.classList.remove('open'); deState=null; deDrag=null;
  }
});

// 저장 내역 사진 클릭
function showImg(id){
  const arr=loadHist();
  const item=arr.find(x=>x.id==id);  // 타입 무관 비교(문자열/숫자 모두 허용)
  if(!item||!item.snap) return;
  openOverlay(item.snap, item.value);
}

// 스캔 결과 사진 클릭
function openSnapOverlay(){
  const snap=document.getElementById('scanSnap');
  if(!snap||!snap.src||snap.style.display==='none') return;
  const val=document.getElementById('scanVal').textContent;
  openOverlay(snap.src, val);
}

// ===== 사진을 폰에 저장 =====
// dataURL → Blob 변환
function dataURLtoBlob(dataURL){
  const [head,body]=dataURL.split(',');
  const mime=(head.match(/:(.*?);/)||[])[1]||'image/jpeg';
  const bin=atob(body);
  const arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new Blob([arr],{type:mime});
}

// 사진을 폰에 바로 저장(다운로드 폴더). 촬영하면 바로 저장되는 것처럼 자동 호출.
function downloadImage(dataURL, name){
  if(!dataURL) return;
  try{
    const ts=new Date();
    const stamp=ts.getFullYear()+''+(ts.getMonth()+1).toString().padStart(2,'0')+
      ts.getDate().toString().padStart(2,'0')+'_'+ts.getHours().toString().padStart(2,'0')+
      ts.getMinutes().toString().padStart(2,'0')+ts.getSeconds().toString().padStart(2,'0');
    const safe=(name||'barcode').replace(/[^A-Za-z0-9_\-]/g,'');
    const fname=(safe?safe+'_':'')+stamp+'.jpg';
    const blob=dataURLtoBlob(dataURL);
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=fname;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  }catch(e){}
}

// ===== 네비 =====
function go(name,btn){
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('pg-'+name).classList.add('on');
  if(name!=='scan' && scanner) stopScan();
  if(name==='hist') renderHist();
}

function sf(b){
  document.querySelectorAll('.fm').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  fmt=b.dataset.f;
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// ===== 카메라 권한 체크 =====
async function checkCamPermission(){
  try{
    const result=await navigator.permissions.query({name:'camera'});
    return result.state; // 'granted','denied','prompt'
  }catch(e){return 'prompt';}
}

// ===== 1. 바코드 생성 =====
function mkBC(){
  const raw=document.getElementById('tagIn').value.trim();
  if(!raw)return;
  renderCode(raw, fmt);
}

// 명시한 값으로 직접 코드 생성(입력칸을 거치지 않음 → 줄바꿈 등 보존)
function renderCode(value, format){
  if(!value && value!=='') return;
  const o=document.getElementById('bcOut');
  const actions='<div class="bc-actions">'+
    '<button class="btn-s" onclick="dlPNG()">PNG 저장</button>'+
    '<button class="btn-s" onclick="dlSVG()">SVG 저장</button>'+
    '<button class="btn-s" onclick="sharePNG()">공유</button></div>';
  if(format==='QR'){
    // QR은 대소문자/구분자/줄바꿈 보존(스캔 시 줄바꿈=Enter → 엑셀 다음 행)
    o.innerHTML='<div class="bc-card" style="padding:10px"><div id="qrHolder"></div></div>'+actions+
      '<div class="ptext" style="margin-top:6px">데이터가 많으면 화면 밝기를 높이고 스캐너를 가까이/천천히 비추세요</div>';
    try{
      const writer=new ZXing.BrowserQRCodeSvgWriter();
      // 오류정정 L(모듈 수↓ → 모듈 크게) + 여백 확보 → 화면 스캔 오독 방지
      let hints=null;
      try{
        hints=new Map();
        hints.set(ZXing.EncodeHintType.ERROR_CORRECTION,'L');
        hints.set(ZXing.EncodeHintType.MARGIN,2);
      }catch(e){ hints=null; }
      const svg = hints ? writer.write(value,512,512,hints) : writer.write(value,512,512);
      svg.setAttribute('id','bcSvg');
      // 화면에서 최대한 크게 표시(모듈을 물리적으로 키워 인식률↑)
      svg.style.background='#fff';svg.style.width='100%';svg.style.height='auto';
      svg.style.maxWidth='92vw';svg.style.imageRendering='pixelated';
      document.getElementById('qrHolder').appendChild(svg);
    }catch(e){ toast('QR 생성 실패: '+e.message); }
    return;
  }
  // 1D 바코드: 단일 입력은 대문자화, 합친값(줄바꿈 포함)은 그대로 인코딩
  const tag=value.includes('\n')?value:value.toUpperCase();
  o.innerHTML='<div class="bc-card"><svg id="bcSvg"></svg></div>'+actions;
  try{
    JsBarcode('#bcSvg',tag,{format:format,width:2,height:80,displayValue:true,
      fontSize:18,font:"Consolas,monospace",margin:10,background:'#fff',lineColor:'#000'});
  }catch(e){ toast('바코드 생성 실패: '+e.message); }
}

function mkBatch(){
  const lines=document.getElementById('batchIn').value.split('\n').map(l=>l.trim().toUpperCase()).filter(l=>l);
  if(!lines.length)return;
  const o=document.getElementById('bcOut');o.innerHTML='';
  lines.forEach((tag,i)=>{
    const d=document.createElement('div');d.className='multi-card';
    d.innerHTML='<svg id="b_'+i+'"></svg>';o.appendChild(d);
    JsBarcode('#b_'+i,tag,{format:fmt,width:2,height:55,displayValue:true,
      fontSize:13,font:"Consolas,monospace",margin:8,background:'#fff',lineColor:'#000'});
  });
}

// ===== 2. QR/바코드 스캔 =====
async function startScan(){
  const note=document.getElementById('scanPermNote');
  const perm=await checkCamPermission();

  if(perm==='denied'){
    note.innerHTML='<br>⚠️ 카메라 권한이 거부되었습니다.<br><br>'+
      '<b>Android:</b> 설정 → 앱 → 브라우저 → 권한 → 카메라 → 허용<br>'+
      '<b>Chrome:</b> 주소창 왼쪽 🔒 아이콘 → 카메라 → 허용';
    note.style.color='#e85050';
    return;
  }

  try{
    // 권한 요청 테스트
    const testStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:camFacing}});
    testStream.getTracks().forEach(t=>t.stop());

    document.getElementById('scanPerm').style.display='none';
    document.getElementById('scanActive').style.display='block';

    await startScanner();
  }catch(e){
    note.innerHTML='<br>⚠️ 카메라 접근 실패: '+e.message+'<br><br>'+
      '브라우저 설정에서 카메라 권한을 확인해주세요.';
    note.style.color='#e85050';
  }
}

// 현재 camFacing으로 스캐너 시작(전환 시 재사용)
async function startScanner(){
  scanLocked=false;
  // 전면 카메라는 거울처럼 좌우 반전
  document.getElementById('scanZone').classList.toggle('mirrored',camFacing==='user');
  scanner=new Html5Qrcode('scanZone');
  await scanner.start(
    {facingMode:camFacing},
    {
      fps:15,
      // 바코드는 가로로 길어서 넓은 직사각형 스캔창이 유리. 화면 크기에 맞춰 동적 설정.
      qrbox:(vw,vh)=>({width:Math.floor(Math.min(vw,vh*1.6)*0.92),height:Math.floor(vh*0.45)}),
      // 후면 카메라 고화질 우선 + 1:1 비율 강제 해제(일반 카메라처럼 꽉 차게)
      videoConstraints:{facingMode:camFacing,width:{ideal:1920},height:{ideal:1080}}
    },
    (text,result)=>{
      if(multiMode){                  // 연속 합치기: 정지하지 않고 목록에 누적
        if(multiCooldown) return;
        onMultiDetected(text);
        return;
      }
      if(scanLocked) return;          // 1회만: 인식 즉시 자동 촬영
      scanLocked=true;
      onScanDetected(text,result);
    },
    ()=>{}
  );
}

// 인식 순간 자동 촬영(현재 프레임 캡처) + 스캔 정지 + 결과 표시 + 자동 저장
async function onScanDetected(text,result){
  const snap=captureSnapshot();
  const type=result.result.format?.formatName||'QR/Barcode';
  document.getElementById('scanVal').textContent=text;
  document.getElementById('scanType').textContent=type;
  document.getElementById('scanResult').style.display='block';
  document.getElementById('scanZone').style.display='none';
  document.getElementById('scanControls').style.display='none';
  try{ if(navigator.vibrate) navigator.vibrate(120); }catch(e){}
  // 앱 내 저장 내역에 기록
  addHist(text, type, snap);
  // 폰에 사진 자동 저장(촬영하면 바로 저장되는 것처럼)
  if(snap) downloadImage(snap, text);
  toast('저장됨: '+text);
  if(scanner){ try{await scanner.stop();}catch(e){} try{await scanner.clear();}catch(e){} scanner=null; }
}

// ===== 연속 합치기 모드 =====
function toggleMultiMode(on){
  multiMode=on;
  document.getElementById('multiPanel').style.display=on?'block':'none';
  if(on) renderMultiList();
  toast(on?'연속 합치기 모드 ON':'연속 합치기 모드 OFF');
}

// 연속 모드에서 코드 인식: 목록에 누적(중복 제외) 후 계속 스캔
function onMultiDetected(text){
  const v=(text||'').trim();
  if(!v) return;
  if(multiList.includes(v)){ toast('이미 추가됨: '+v); }
  else{
    multiList.push(v);
    renderMultiList();
    try{ if(navigator.vibrate) navigator.vibrate(60); }catch(e){}
    toast('추가됨('+multiList.length+'): '+v);
  }
  // 같은 코드를 연속으로 다시 잡지 않도록 잠깐 잠금
  multiCooldown=true;
  setTimeout(()=>{ multiCooldown=false; },1500);
}

function renderMultiList(){
  document.getElementById('multiCount').textContent=multiList.length+'개 수집됨';
  const el=document.getElementById('multiList');
  if(!multiList.length){ el.innerHTML='<span class="multi-empty">아직 없음 — 코드를 차례로 비추세요</span>'; return; }
  el.innerHTML=multiList.map((v,i)=>
    '<span class="chip">'+escHtml(v)+
    ' <span class="x" onclick="removeMulti('+i+')">✕</span></span>').join('');
}

function removeMulti(i){
  multiList.splice(i,1);
  renderMultiList();
}

function clearMulti(){
  multiList=[];
  renderMultiList();
  toast('목록 비움');
}

// select의 리터럴 이스케이프(\n \r \t)를 실제 제어문자로 변환
function decodeSep(s){
  const map={'\\n':'\n','\\r':'\r','\\r\\n':'\r\n','\\t':'\t'};
  return (s in map)?map[s]:s;
}
function getMergedValue(){
  return multiList.join(decodeSep(document.getElementById('multiSep').value));
}

function copyMerged(){
  if(!multiList.length){ toast('수집된 코드가 없습니다'); return; }
  const merged=getMergedValue();
  navigator.clipboard.writeText(merged).then(()=>toast('합친값 복사됨'));
}

// 공용: 값 배열을 구분자로 합쳐 하나의 코드(CODE128/QR)로 생성 → 생성 탭 표시
function generateMerged(values, sep, format){
  const list=(values||[]).map(v=>String(v).trim()).filter(Boolean);
  if(!list.length){ toast('합칠 값이 없습니다'); return; }
  const s=decodeSep(sep);
  const merged=list.join(s);
  // 입력칸(input)은 줄바꿈을 제거하므로 표시용으로만 사용하고, 생성은 merged로 직접
  document.getElementById('tagIn').value=merged.replace(/[\r\n\t]/g,' ');
  fmt=format;
  document.querySelectorAll('.fm').forEach(x=>x.classList.toggle('on',x.dataset.f===format));
  go('gen',document.querySelectorAll('.nav button')[0]);
  renderCode(merged, format);   // 제어문자(줄바꿈 등) 포함 원본 값으로 직접 생성
  const ctrl=/[\r\n\t]/.test(s);
  toast('합쳐서 '+(format==='QR'?'QR코드':'바코드')+' 생성됨('+list.length+'개)'+(ctrl?' · 구분자 포함':''));
}

// 스캔 탭(연속 합치기) → 공용 함수 호출
async function makeMerged(format){
  if(!multiList.length){ toast('수집된 코드가 없습니다'); return; }
  if(scanner){ try{await scanner.stop();}catch(e){} try{await scanner.clear();}catch(e){} scanner=null; }
  generateMerged(multiList, document.getElementById('multiSep').value, format);
}

// 바코드 생성 탭: 일괄 입력칸의 줄들을 합쳐서 하나로
function mergeFromBatch(format){
  const lines=document.getElementById('batchIn').value.split('\n').map(l=>l.trim()).filter(Boolean);
  generateMerged(lines, document.getElementById('genMergeSep').value, format);
}

// 사진 OCR 탭: 인식된 값들을 합쳐서 하나로
function mergeOcrResults(format){
  const vals=[...new Set(ocrFiles.filter(f=>!f.failed).flatMap(f=>f.words).map(w=>w.text))];
  generateMerged(vals, document.getElementById('ocrMergeSep').value, format);
}

// 현재 영상 프레임을 캡처해 결과에 표시. base64 반환.
function captureSnapshot(){
  try{
    const video=document.querySelector('#scanZone video');
    if(!video||!video.videoWidth) return null;
    const c=document.createElement('canvas');
    c.width=video.videoWidth;c.height=video.videoHeight;
    const ctx=c.getContext('2d');
    // 카메라 원본 프레임 그대로 저장 → 글자가 정상 방향으로 읽힘.
    // (전면 카메라 프리뷰는 거울 반전이라 거꾸로 보이지만, 원본 프레임은 정방향)
    ctx.drawImage(video,0,0,c.width,c.height);
    const dataUrl=c.toDataURL('image/jpeg',0.75);
    const snap=document.getElementById('scanSnap');
    snap.src=dataUrl;
    snap.style.display='block';
    document.getElementById('snapNoImg').style.display='none';
    document.getElementById('snapOverlay').style.display='block';
    return dataUrl;
  }catch(e){ return null; }
}

// ===== 3. 사진 OCR =====
function addPhotos(e){
  const files=Array.from(e.target.files);
  if(!files.length)return;

  files.forEach(f=>{
    const id='ocr_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
    const url=URL.createObjectURL(f);
    ocrFiles.push({id,file:f,url,status:'대기',words:[]});
  });

  renderQueue();
  document.getElementById('ocrStartBtn').style.display='block';
  e.target.value='';
}

function renderQueue(){
  const q=document.getElementById('ocrQueue');
  q.innerHTML='';
  ocrFiles.forEach((item,idx)=>{
    const div=document.createElement('div');
    div.className='oq-item';
    let wordsHtml='';
    if(item.words.length){
      wordsHtml='<div class="chip-list">'+item.words.map(w=>{
        const hi=w.isBc||w.derived;
        const icon=w.isBc?'📊 ':(w.derived?'🔑 ':'');
        const label=w.isBc?'바코드':(w.derived?'코드변환':w.conf+'%');
        return '<span class="chip'+(hi?' sel':'')+'" onclick="pickWord(\''+w.text+'\')">'+icon+w.text+
          ' <span class="c">'+label+'</span></span>';
      }).join('')+'</div>';
    }
    div.innerHTML=
      '<img src="'+item.url+'" style="cursor:pointer" onclick="openOverlay(\''+item.url+'\',\''+escHtml(item.file.name||'사진'+(idx+1))+'\')">'+
      '<div class="info">'+
        '<div class="name">'+(item.file.name||'사진 '+(idx+1))+'</div>'+
        '<div class="status">'+item.status+'</div>'+
        wordsHtml+
      '</div>'+
      '<button class="btn-s" onclick="removeOcr('+idx+')" style="padding:6px 10px;font-size:11px">✕</button>';
    q.appendChild(div);
  });
}

function removeOcr(idx){
  ocrFiles.splice(idx,1);
  renderQueue();
  renderFailed();
  if(!ocrFiles.length) document.getElementById('ocrStartBtn').style.display='none';
}

// 인식 실패한 사진을 한곳에 모아서 표시(썸네일 갤러리, 탭하면 확대)
function renderFailed(){
  const box=document.getElementById('ocrFailed');
  const failed=ocrFiles.filter(f=>f.failed);
  if(!failed.length){ box.innerHTML=''; return; }
  let html='<div class="sep">인식 실패 ('+failed.length+'장)</div>'+
    '<div class="fail-grid">';
  failed.forEach(f=>{
    html+='<div class="fail-cell">'+
      '<img src="'+f.url+'" onclick="openOverlay(\''+f.url+'\',\''+escHtml(f.file.name||'실패 사진')+'\')">'+
      '<div class="fail-name">'+escHtml(f.file.name||'사진')+'</div>'+
      '<button class="btn-s fail-fix" onclick="openDocEditor(\''+f.id+'\')">✂️ 수동 보정</button>'+
    '</div>';
  });
  html+='</div>';
  html+='<div class="fail-hint">수동 보정: 코드 영역의 네 모서리를 드래그해 맞추면 정면으로 펴서 다시 스캔합니다.</div>';
  if(!ocrUseText){
    html+='<div class="fail-hint">글자 OCR 스위치를 켜면 바코드가 없는 사진의 글자도 읽어볼 수 있어요.</div>';
  }
  box.innerHTML=html;
}

function pickWord(text){
  const inp=document.getElementById('tagIn');
  inp.value=text;
  go('gen',document.querySelectorAll('.nav button')[0]);
  mkBC();
  // OCR은 8↔B, 5↔S, 0↔O, 1↔I 혼동 가능 → 사용자가 바로 수정할 수 있게 입력창 포커스/선택
  inp.focus();
  try{inp.setSelectionRange(0,inp.value.length);}catch(e){}
  toast('확인·수정 후 생성하세요: '+text);
}

async function runBatchOCR(){
  const prog=document.getElementById('ocrProg');
  const bar=document.getElementById('ocrBar');
  const txt=document.getElementById('ocrText');
  prog.style.display='block';
  txt.style.display='block';
  document.getElementById('ocrStartBtn').disabled=true;
  // 재인식: 이전에 실패/미인식한 사진은 다시 시도(글자 OCR 토글 변경 후 재시도 대응)
  ocrFiles.forEach(f=>{ if(f.failed||/실패|미인식|오류/.test(f.status||'')){ f.status='대기'; f.failed=false; f.words=[]; } });
  document.getElementById('ocrFailed').innerHTML='';

  for(let i=0;i<ocrFiles.length;i++){
    const item=ocrFiles[i];
    if(item.status!=='대기'){
      bar.style.width=((i+1)/ocrFiles.length*100)+'%';
      continue;
    }

    item.status='인식 중...';
    renderQueue();
    txt.textContent='('+(i+1)+'/'+ocrFiles.length+') '+item.file.name+' 인식 중...';

    try{
      // 1차: zbar-wasm으로 바코드/QR 인식 (0°/90° + 2배 확대 재시도)
      let bcDetected=false;
      item.failed=false;
      try{
        const symbols=await scanBarcode(item.file);
        if(symbols.length){
          item.words=symbols.map(s=>({
            text:s.value.replace(/[^A-Za-z0-9\-]/g,'').toUpperCase(),
            conf:100,isBc:true,bcType:s.type
          })).filter(w=>w.text.length>=2);
          if(item.words.length){
            item.status='바코드/QR 인식 완료 ('+item.words.length+'개)';
            bcDetected=true;
          }
        }
      }catch(zbErr){}

      // 1.5차: 바코드 미감지 시 '자동 문서보정(원근 교정)' 후 재시도(갤럭시 갤러리 스캔 방식)
      if(!bcDetected){
        try{
          item.status='문서 자동보정 중...';renderQueue();
          const doc=await autoDocScan(item.file);
          if(doc&&doc.canvas){
            const symbols=await scanBarcodeImg(doc.canvas);
            if(symbols.length){
              item.words=symbols.map(s=>({
                text:s.value.replace(/[^A-Za-z0-9\-]/g,'').toUpperCase(),
                conf:100,isBc:true,bcType:s.type
              })).filter(w=>w.text.length>=2);
              if(item.words.length){
                item.status='보정 후 인식 완료 ('+item.words.length+'개)';
                bcDetected=true;
              }
            }
          }
        }catch(docErr){}
      }

      // 글자 OCR이 꺼져 있으면: 바코드 못 읽은 사진은 '인식 실패'로 분류(→ 수동 보정 가능)
      if(!bcDetected && !ocrUseText){
        item.words=[];
        item.failed=true;
        item.status='바코드/QR 미인식';
      }

      // 2차: (글자 OCR ON일 때만) 바코드 미감지 시 OCR (0°/180° 시도)
      if(!bcDetected && ocrUseText){
        const worker=await Tesseract.createWorker('eng',1,{
          logger:m=>{
            if(m.status==='recognizing text'){
              const pct=Math.round(m.progress*100);
              bar.style.width=((i+pct/100)/ocrFiles.length*100)+'%';
            }
          }
        });

        // 2단계 필터: ①신뢰도 50%↑ 일반 통과  ②영문+숫자 혼합 5~14자(서비스태그/
        // 시리얼 패턴)는 30%↑도 통과. tagLike 플래그도 함께 반환.
        const parseWords=d=>{
          const out=[];
          for(const w of d.words){
            const t=(w.text||'').replace(/[^A-Za-z0-9\-]/g,'').toUpperCase();
            if(t.length<2 || !/[A-Za-z0-9]/.test(t)) continue;
            const c=Math.round(w.confidence);
            const tagLike=t.length>=5 && t.length<=14 && /[A-Z]/.test(t) && /[0-9]/.test(t);
            if(c>=50 || (tagLike && c>=30)) out.push({text:t,conf:c,tagLike});
          }
          return out;
        };

        // 1패스: 원본 그대로 인식(깨끗 — 대비강화는 배경 노이즈를 가짜 단어로 증폭시킴)
        const {data}=await worker.recognize(item.file);
        let words=parseWords(data);

        // 2패스: 서비스태그형 토큰이 안 잡혔을 때만, 대비강화 이미지에서 '태그형'만 구제
        // (음각 8MW5XF3처럼 원본 신뢰도 0%인 글씨 대응)
        if(!words.some(w=>w.tagLike)){
          item.status='태그 보강 인식 중...';renderQueue();
          const prepped=await enhanceForOCR(item.file);
          const {data:dataE}=await worker.recognize(prepped);
          for(const w of parseWords(dataE)) if(w.tagLike) words.push(w);
        }

        // 3패스: 그래도 태그형이 없으면 가로 밴드 분할 + SINGLE_LINE으로 재인식.
        // 한 줄씩 따로 읽으면 음각 글씨의 숫자(8/5 등) 인식이 개선됨(여러 후보 제시).
        if(!words.some(w=>w.tagLike)){
          item.status='줄 단위 보강 인식 중...';renderQueue();
          for(const w of await bandRescue(item.file,worker)) words.push(w);
        }

        // 그래도 아무것도 없으면 180도 회전 재시도(거꾸로 촬영 대응)
        if(words.length===0){
          item.status='회전 후 재인식 중...';renderQueue();
          const rotated=await rotateImageByAngle(item.file,180);
          const {data:data2}=await worker.recognize(rotated);
          words=parseWords(data2);
        }

        await worker.terminate();

        // Dell 보정: Express Service Code(순수 숫자)는 Service Tag를 10진수로 표현한 값.
        // 36진수로 역변환하면 정확한 Service Tag가 나옴 → OCR의 8↔B,5↔S 혼동을 우회.
        for(const w of [...words]){
          if(/^\d{9,12}$/.test(w.text)){
            const tag=expressToServiceTag(w.text);
            if(tag) words.unshift({text:tag,conf:99,derived:true,tagLike:true});
          }
        }

        const unique=[...new Map(words.map(w=>[w.text,w])).values()];
        item.words=unique;
        if(unique.length){
          item.status='텍스트 인식 완료 ('+unique.length+'개)';
        }else{
          item.failed=true;
          item.status='인식 실패';
        }
      }
    }catch(e){
      item.failed=true;
      item.status='오류: '+e.message;
    }

    bar.style.width=((i+1)/ocrFiles.length*100)+'%';
    renderQueue();
  }

  const failCount=ocrFiles.filter(f=>f.failed).length;
  txt.textContent=failCount?('완료 — 인식 실패 '+failCount+'장'):'전체 인식 완료!';
  document.getElementById('ocrStartBtn').disabled=false;
  document.getElementById('ocrStartBtn').textContent='다시 인식';

  renderFailed();
  refreshOcrOutputs();
}

// 인식된 값들로 개별 바코드 + 합치기 행 갱신(자동 인식/수동 보정 후 공통 사용)
function refreshOcrOutputs(){
  const allWords=ocrFiles.filter(f=>!f.failed).flatMap(f=>f.words).map(w=>w.text);
  const uniqueAll=[...new Set(allWords)];
  document.getElementById('ocrMergeRow').style.display=uniqueAll.length?'flex':'none';
  const out=document.getElementById('ocrBcOut');
  if(!uniqueAll.length){ out.innerHTML=''; return; }

// ===== 수동 문서보정 에디터 =====
let deState=null;
function openDocEditor(id){
  const item=ocrFiles.find(f=>f.id===id);
  if(!item) return;
  const ed=document.getElementById('docEditor');
  const stage=document.getElementById('deStage');
  const imgEl=document.getElementById('deImg');
  ed.classList.add('open');
  history.pushState({docEditor:true},'');
  const natImg=new Image();
  natImg.onload=()=>{
    const nw=natImg.naturalWidth, nh=natImg.naturalHeight;
    imgEl.src=natImg.src;
    // 스테이지에 맞춰 표시 크기 계산
    const sw=stage.clientWidth, sh=stage.clientHeight;
    const scale=Math.min(sw/nw, sh/nh);
    const dispW=nw*scale, dispH=nh*scale;
    imgEl.style.width=dispW+'px'; imgEl.style.height=dispH+'px';
    const offX=(sw-dispW)/2, offY=(sh-dispH)/2;
    // 초기: 클릭&드래그로 코드 영역 사각형을 그림(또는 프리셋)
    deState={id,img:natImg,nw,nh,scale,offX,offY,pts:[],placing:true};
    setDeTitle('코드 영역을 드래그해 사각형을 그리세요');
    layoutDocHandles();
  };
  natImg.src=item.url;
}

function layoutDocHandles(){
  if(!deState) return;
  const stage=document.getElementById('deStage');
  stage.classList.toggle('placing',!!deState.placing);
  const handles=document.querySelectorAll('#docEditor .de-handle');
  const poly=document.getElementById('dePoly');
  const sp=deState.pts.map(p=>({
    x:deState.offX+p.x*deState.scale,
    y:deState.offY+p.y*deState.scale
  }));
  // 찍힌 점만 핸들 표시, 나머지는 숨김
  handles.forEach((h,i)=>{
    if(i<sp.length){ h.style.display='block'; h.style.left=sp[i].x+'px'; h.style.top=sp[i].y+'px'; }
    else h.style.display='none';
  });
  poly.setAttribute('points',sp.map(p=>p.x+','+p.y).join(' '));
}

// 스테이지를 탭해 점 찍기(placing 모드일 때만)
function stageToImgCoord(e){
  const stage=document.getElementById('deStage');
  const r=stage.getBoundingClientRect();
  let x=(e.clientX-r.left-deState.offX)/deState.scale;
  let y=(e.clientY-r.top-deState.offY)/deState.scale;
  return {x:Math.max(0,Math.min(deState.nw,x)),y:Math.max(0,Math.min(deState.nh,y))};
}

// 점이 사각형(폴리곤) 내부인지 판정
function pointInQuad(pt,poly){
  let inside=false;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const xi=poly[i].x,yi=poly[i].y,xj=poly[j].x,yj=poly[j].y;
    if(((yi>pt.y)!==(yj>pt.y)) && (pt.x<(xj-xi)*(pt.y-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}

// 드래그 상호작용 상태
let deDrag=null;          // 코너 핸들 인덱스
let deCreate=null;        // 영역 생성 시작점(img 좌표)
let deFace=null;          // 면(전체) 이동 시작 포인터(img 좌표)
document.addEventListener('pointerdown',e=>{
  if(!deState) return;
  const h=e.target.closest('#docEditor .de-handle');
  if(h && !deState.placing){               // 코너 드래그
    deDrag=parseInt(h.dataset.i,10);
    h.setPointerCapture(e.pointerId);
    e.preventDefault();
    return;
  }
  if(!e.target.closest('#deStage')) return;
  const p=stageToImgCoord(e);
  if(deState.placing){                      // 클릭&드래그로 사각형 생성 시작
    deCreate=p;
    deState.pts=[{x:p.x,y:p.y},{x:p.x,y:p.y},{x:p.x,y:p.y},{x:p.x,y:p.y}];
    layoutDocHandles();
    e.preventDefault();
    return;
  }
  // 영역 확정 상태: 면(안쪽)을 잡으면 전체 이동
  if(deState.pts.length===4 && pointInQuad(p,deState.pts)){
    deFace=p;
    e.preventDefault();
  }
});
document.addEventListener('pointermove',e=>{
  if(!deState) return;
  if(deDrag!==null){                        // 코너 이동
    deState.pts[deDrag]=stageToImgCoord(e);
    layoutDocHandles();
  }else if(deCreate){                        // 사각형 생성 중(드래그)
    const c=stageToImgCoord(e);
    const x1=Math.min(deCreate.x,c.x),x2=Math.max(deCreate.x,c.x);
    const y1=Math.min(deCreate.y,c.y),y2=Math.max(deCreate.y,c.y);
    deState.pts=[{x:x1,y:y1},{x:x2,y:y1},{x:x2,y:y2},{x:x1,y:y2}];
    layoutDocHandles();
  }else if(deFace){                          // 면 드래그로 전체 이동
    const c=stageToImgCoord(e);
    let dx=c.x-deFace.x, dy=c.y-deFace.y;
    // 경계 밖으로 나가지 않게 보정
    const xs=deState.pts.map(p=>p.x), ys=deState.pts.map(p=>p.y);
    dx=Math.max(-Math.min(...xs),Math.min(deState.nw-Math.max(...xs),dx));
    dy=Math.max(-Math.min(...ys),Math.min(deState.nh-Math.max(...ys),dy));
    deState.pts=deState.pts.map(p=>({x:p.x+dx,y:p.y+dy}));
    deFace=c;
    layoutDocHandles();
  }
});
document.addEventListener('pointerup',()=>{
  if(deCreate){
    deCreate=null;
    // 너무 작게 그렸으면 다시 그리기 대기, 충분하면 확정
    const xs=deState.pts.map(p=>p.x), ys=deState.pts.map(p=>p.y);
    const w=Math.max(...xs)-Math.min(...xs), h=Math.max(...ys)-Math.min(...ys);
    if(w>deState.nw*0.03 && h>deState.nh*0.02){
      deState.pts=orderQuad(deState.pts);
      deState.placing=false;
      setDeTitle('모서리 또는 안쪽(면)을 드래그해 조정 후 스캔');
    }else{
      deState.pts=[];
      setDeTitle('코드 영역을 드래그해 사각형을 그리세요');
    }
    layoutDocHandles();
  }
  deDrag=null; deFace=null;
});

// 프리셋: 가운데에 기본 영역 배치(이후 드래그로 미세조정)
function setDocPreset(wRatio,hRatio){
  if(!deState) return;
  const w=deState.nw*wRatio, h=deState.nh*hRatio;
  const cx=deState.nw/2, cy=deState.nh/2;
  deState.pts=[
    {x:cx-w/2,y:cy-h/2},{x:cx+w/2,y:cy-h/2},
    {x:cx+w/2,y:cy+h/2},{x:cx-w/2,y:cy+h/2}
  ];
  deState.placing=false;
  setDeTitle('모서리를 드래그해 맞춘 뒤 스캔');
  layoutDocHandles();
}

function presetQR(){
  if(!deState) return;
  const side=Math.min(deState.nw,deState.nh)*0.55;      // 정사각형 QR
  setDocPreset(side/deState.nw, side/deState.nh);
}

// ===== zbar-wasm 바코드/QR 디코딩 =====
// 파일 -> 캔버스 ImageData(각도/배율) -> zbar 스캔. 첫 적중에서 반환.
function fileToImage(file){
  return new Promise((resolve,reject)=>{
    const url=URL.createObjectURL(file);
    const img=new Image();
    img.onload=()=>{URL.revokeObjectURL(url);resolve(img);};
    img.onerror=e=>{URL.revokeObjectURL(url);reject(e);};
    img.src=url;
  });
}
function imageToData(img,angle,scale){
  const swap=angle===90||angle===270;
  const w=Math.round((swap?img.height:img.width)*scale);
  const h=Math.round((swap?img.width:img.height)*scale);
  const c=document.createElement('canvas');c.width=w;c.height=h;
  const ctx=c.getContext('2d');
  ctx.translate(w/2,h/2);ctx.rotate(angle*Math.PI/180);
  ctx.drawImage(img,-img.width*scale/2,-img.height*scale/2,img.width*scale,img.height*scale);
  return ctx.getImageData(0,0,w,h);
}
// ===== OCR 전처리: 2배 확대 + 그레이스케일 대비강화 =====
// 음각/저대비 서비스태그 글씨의 인식 신뢰도를 끌어올림.
async function enhanceForOCR(file){
  const img=await fileToImage(file);
  // 작은 글씨는 확대가 도움되지만, 고해상도 사진은 과대 확대 시 매우 느려짐 →
  // 목표 너비 2400px 기준으로 정규화(0.6~2배 범위).
  const scale=Math.min(2,Math.max(0.6,2400/img.width));
  const c=document.createElement('canvas');
  c.width=Math.round(img.width*scale);c.height=Math.round(img.height*scale);
  const ctx=c.getContext('2d');
  ctx.drawImage(img,0,0,c.width,c.height);
  const id=ctx.getImageData(0,0,c.width,c.height);
  const d=id.data;
  let mn=255,mx=0;
  const g=new Float32Array(c.width*c.height);
  for(let i=0,j=0;i<d.length;i+=4,j++){
    const v=d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114;
    g[j]=v;if(v<mn)mn=v;if(v>mx)mx=v;
  }
  const range=Math.max(1,mx-mn);
  for(let i=0,j=0;i<d.length;i+=4,j++){
    const v=Math.max(0,Math.min(255,(g[j]-mn)/range*255));
    d[i]=d[i+1]=d[i+2]=v;
  }
  ctx.putImageData(id,0,0);
  return c;
}

// ===== Dell: Express Service Code(10진수) → Service Tag(36진수) 역변환 =====
// 18798538863 → 8MW5XF3. 순수 숫자는 OCR이 정확히 읽으므로 태그를 100% 정확히 도출.
function expressToServiceTag(numStr){
  if(!/^\d{9,12}$/.test(numStr)) return null;
  try{
    let n=BigInt(numStr);
    if(n<=0n) return null;
    const D='0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    let s='';
    while(n>0n){ s=D[Number(n%36n)]+s; n=n/36n; }
    if(s.length<5||s.length>8) return null; // Dell 서비스태그는 보통 7자
    return s;
  }catch(e){ return null; }
}

// ===== 줄 단위 OCR 보강: 가로 밴드 분할 + SINGLE_LINE =====
// 음각/저대비 태그를 한 줄씩 읽어 숫자 인식을 개선. 태그형(영문+숫자 5~14자) 후보만 수집.
async function bandRescue(file,worker){
  const img=await fileToImage(file);
  const out=[];
  try{
    await worker.setParameters({tessedit_pageseg_mode:'7'}); // SINGLE_LINE
    const bands=4,ov=0.5,bh=img.height/bands;
    // 밴드 확대도 해상도에 맞춰 제한(고해상도 사진에서 12000px 캔버스로 폭주 방지)
    const sc=Math.min(3,Math.max(1.5,2400/img.width));
    for(let i=0;i<bands;i++){
      const y=Math.max(0,(i-ov)*bh);
      const h=Math.min(img.height-y,bh*(1+2*ov));
      const c=document.createElement('canvas');
      c.width=Math.round(img.width*sc);c.height=Math.round(h*sc);
      c.getContext('2d').drawImage(img,0,y,img.width,h,0,0,c.width,c.height);
      const {data}=await worker.recognize(c);
      for(const tok of (data.text||'').split(/\s+/)){
        const t=tok.replace(/[^A-Za-z0-9\-]/g,'').toUpperCase();
        if(t.length>=5&&t.length<=14&&/[A-Z]/.test(t)&&/[0-9]/.test(t))
          out.push({text:t,conf:Math.round(data.confidence)||30,tagLike:true});
      }
    }
  }catch(e){}
  finally{ try{await worker.setParameters({tessedit_pageseg_mode:'3'});}catch(e){} } // AUTO 복구
  return out;
}

async function scanBarcode(file){
  const img=await fileToImage(file);

// 이미지 또는 캔버스를 받아 바코드/QR 디코딩(자동 문서보정 결과에도 재사용)
async function scanBarcodeImg(img){
  // 중요: 요즘 폰 사진은 4000px+ 라 zbar가 풀해상도에서 오히려 실패함.
  // 목표 너비(1600/1000/2000px)로 '정규화'한 뒤 여러 각도로 시도 → 인식률↑, 속도↑.
  // 30° 간격 회전으로 비스듬히(평면 기울기) 찍힌 바코드도 대응(원근 왜곡은 라이브 스캔 권장).
  const widths=[1600,1000,2000];
  const angles=[0,90,180,270,30,60,120,150];
  // 1) zbar-wasm: 1D 바코드 + QR
  for(const tw of widths){
    const scale=tw/img.width;
    for(const angle of angles){
      try{
        const data=imageToData(img,angle,scale);
        const symbols=await zbarWasm.scanImageData(data);
        if(symbols&&symbols.length){
          return symbols.map(s=>({value:s.decode(),type:(s.typeName||'').replace('ZBAR_','')}));
        }
      }catch(e){}
    }
  }
  // 2) ZXing: zbar가 못 읽는 DataMatrix(Dell 서비스태그 등) + QR 보조
  if(window.ZXing){
    try{
      const hints=new Map();
      hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS,[ZXing.BarcodeFormat.DATA_MATRIX,ZXing.BarcodeFormat.QR_CODE]);
      hints.set(ZXing.DecodeHintType.TRY_HARDER,true);
      const reader=new ZXing.MultiFormatReader();
      reader.setHints(hints);
      for(const tw of [1600,1000,2400]){
        const scale=tw/img.width;
        for(const angle of angles){
        try{
          const data=imageToData(img,angle,scale);
          const lum=new Uint8ClampedArray(data.width*data.height);
          const d=data.data;
          for(let i=0,j=0;i<d.length;i+=4,j++) lum[j]=(d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114)&0xff;
          const src=new ZXing.RGBLuminanceSource(lum,data.width,data.height);
          for(const s of [src,src.invert()]){
            try{
              const bm=new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(s));
              const r=reader.decode(bm,hints);
              if(r&&r.getText()){
                return [{value:r.getText(),type:ZXing.BarcodeFormat[r.getBarcodeFormat()]}];
              }
            }catch(e){}
          }
        }catch(e){}
        }
      }
    }catch(e){}
  }
  return [];
}

// ===== 이미지 각도 회전 (0/90/180/270) =====
function rotateImageByAngle(file,angle){
  return new Promise(resolve=>{
    const url=URL.createObjectURL(file);
    const img=new Image();
    img.onload=()=>{
      const rad=angle*Math.PI/180;
      const swap=angle===90||angle===270;
      const c=document.createElement('canvas');
      c.width=swap?img.height:img.width;
      c.height=swap?img.width:img.height;
      const ctx=c.getContext('2d');
      ctx.translate(c.width/2,c.height/2);
      ctx.rotate(rad);
      ctx.drawImage(img,-img.width/2,-img.height/2);
      c.toBlob(b=>resolve(new File([b],file.name,{type:'image/jpeg'})),'image/jpeg',0.95);
      URL.revokeObjectURL(url);
    };
    img.src=url;
  });
}

// ===== 문서 스캔(갤럭시 갤러리 스캔 방식): OpenCV.js 원근 보정 =====
let _cvPromise=null;
// 여러 CDN을 순서대로 시도(단일 파일 빌드 우선 — 별도 wasm 불필요)
const OPENCV_URLS=[
  'https://docs.opencv.org/4.5.0/opencv.js',
  'https://cdn.jsdelivr.net/npm/opencv.js@1.2.1/opencv.js',
  'https://docs.opencv.org/4.8.0/opencv.js',
  'https://docs.opencv.org/4.10.0/opencv.js'
];
function _tryLoadCV(url){
  return new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src=url; s.async=true;
    let done=false;
    // 런타임 초기화까지 최대 25초 대기
    const timer=setTimeout(()=>{ if(!done){ done=true; reject(new Error('시간초과')); } },25000);
    const ok=()=>{ if(done) return; done=true; clearTimeout(timer); resolve(); };
    s.onload=()=>{
      if(window.cv && cv.Mat){ ok(); return; }
      if(window.cv){ cv['onRuntimeInitialized']=ok; return; }
      // 일부 빌드는 Module 패턴 — 잠시 폴링
      let n=0; const iv=setInterval(()=>{
        if(window.cv && cv.Mat){ clearInterval(iv); ok(); }
        else if(++n>240){ clearInterval(iv); }   // ~24초
      },100);
    };
    s.onerror=()=>{ if(!done){ done=true; clearTimeout(timer); reject(new Error('네트워크')); } s.remove(); };
    document.head.appendChild(s);
  });
}
function loadOpenCV(){
  if(window.cv && cv.Mat) return Promise.resolve();
  if(_cvPromise) return _cvPromise;
  _cvPromise=(async()=>{
    let lastErr='';
    for(const url of OPENCV_URLS){
      try{ await _tryLoadCV(url); if(window.cv&&cv.Mat) return; }
      catch(e){ lastErr=url.split('/').slice(2,3)[0]+' '+(e.message||e); }
    }
    _cvPromise=null;   // 다음에 재시도 가능하도록
    throw new Error('모든 CDN 실패('+lastErr+')');
  })();
  return _cvPromise;
}

// 사각형 4점을 좌상/우상/우하/좌하 순으로 정렬
function orderQuad(pts){
  const p=pts.slice();
  const sum=p.map(q=>q.x+q.y), diff=p.map(q=>q.y-q.x);
  const tl=p[sum.indexOf(Math.min(...sum))];
  const br=p[sum.indexOf(Math.max(...sum))];
  const tr=p[diff.indexOf(Math.min(...diff))];
  const bl=p[diff.indexOf(Math.max(...diff))];
  return [tl,tr,br,bl];
}

// 비스듬한(회전된) 사각형도 안정적으로 정렬: 무게중심 기준 시계방향 정렬 후
// '긴 변'을 가로(상단)로 매핑 → 바코드가 항상 수평이 되도록.
function orderQuadRobust(pts){
  const cx=pts.reduce((a,p)=>a+p.x,0)/4, cy=pts.reduce((a,p)=>a+p.y,0)/4;
  const s=pts.slice().sort((a,b)=>Math.atan2(a.y-cy,a.x-cx)-Math.atan2(b.y-cy,b.x-cx));
  const len=i=>Math.hypot(s[(i+1)%4].x-s[i].x, s[(i+1)%4].y-s[i].y);
  // 마주보는 두 변쌍 중 어느 쪽이 더 긴지에 따라 시작점 선택(긴 변이 상단)
  const pairA=len(0)+len(2), pairB=len(1)+len(3);
  const st=pairA>=pairB?0:1;
  return [s[st],s[(st+1)%4],s[(st+2)%4],s[(st+3)%4]];
}

// 원본 이미지 + 4점(원본 좌표) → 정면 보정된 캔버스(좌우 여백=Quiet Zone 포함)
function warpToCanvas(srcImg, quad){
  const [tl,tr,br,bl]=orderQuadRobust(quad);
  const wA=Math.hypot(br.x-bl.x,br.y-bl.y), wB=Math.hypot(tr.x-tl.x,tr.y-tl.y);
  const hA=Math.hypot(tr.x-br.x,tr.y-br.y), hB=Math.hypot(tl.x-bl.x,tl.y-bl.y);
  const W=Math.max(8,Math.round((wA+wB)/2));
  const H=Math.max(8,Math.round((hA+hB)/2));
  const src=cv.imread(srcImg);
  const dst=new cv.Mat();
  const srcTri=cv.matFromArray(4,1,cv.CV_32FC2,[tl.x,tl.y,tr.x,tr.y,br.x,br.y,bl.x,bl.y]);
  const dstTri=cv.matFromArray(4,1,cv.CV_32FC2,[0,0,W,0,W,H,0,H]);
  const M=cv.getPerspectiveTransform(srcTri,dstTri);
  cv.warpPerspective(src,dst,M,new cv.Size(W,H),cv.INTER_LINEAR,cv.BORDER_CONSTANT,new cv.Scalar());
  const warp=document.createElement('canvas');
  warp.width=W;warp.height=H;
  cv.imshow(warp,dst);
  src.delete();dst.delete();srcTri.delete();dstTri.delete();M.delete();
  // 1D 바코드 필수 여백(Quiet Zone): 흰 배경으로 사방 패딩 추가
  const padX=Math.max(40,Math.round(H*1.0));   // 좌우는 넉넉히
  const padY=Math.max(20,Math.round(H*0.4));
  const out=document.createElement('canvas');
  out.width=W+padX*2; out.height=H+padY*2;
  const c=out.getContext('2d');
  c.fillStyle='#fff'; c.fillRect(0,0,out.width,out.height);
  c.drawImage(warp,padX,padY);
  return out;
}

// 저대비(회색 라벨) 대응: 그레이스케일 + 대비 스트레치 한 캔버스 반환
function enhanceCanvas(srcCanvas){
  const c=document.createElement('canvas');
  c.width=srcCanvas.width; c.height=srcCanvas.height;
  const ctx=c.getContext('2d');
  ctx.drawImage(srcCanvas,0,0);
  const id=ctx.getImageData(0,0,c.width,c.height), d=id.data;
  let mn=255,mx=0;
  const g=new Float32Array(c.width*c.height);
  for(let i=0,j=0;i<d.length;i+=4,j++){
    const v=d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114;
    g[j]=v; if(v<mn)mn=v; if(v>mx)mx=v;
  }
  const range=Math.max(1,mx-mn);
  for(let i=0,j=0;i<d.length;i+=4,j++){
    let v=(g[j]-mn)/range*255;
    v=Math.max(0,Math.min(255,v));
    d[i]=d[i+1]=d[i+2]=v;
  }
  ctx.putImageData(id,0,0);
  return c;
}

// 보정 캔버스를 원본 + 대비강화 두 가지로 스캔(저대비 DataMatrix/QR 대응)
async function scanWarpedBoth(canvas){
  let r=await scanBarcodeImg(canvas);
  if(r.length) return r;
  try{ r=await scanBarcodeImg(enhanceCanvas(canvas)); }catch(e){}
  return r;
}

// 자동 문서 경계 감지 → 가장 큰 사각형 윤곽 찾기(원본 좌표 4점 반환, 없으면 null)
function detectDocQuad(srcImg){
  const src=cv.imread(srcImg);
  const maxSide=Math.max(src.cols,src.rows);
  const scale=maxSide>1200?1200/maxSide:1;
  const small=new cv.Mat();
  cv.resize(src,small,new cv.Size(Math.round(src.cols*scale),Math.round(src.rows*scale)));
  const gray=new cv.Mat(),blur=new cv.Mat(),edge=new cv.Mat();
  cv.cvtColor(small,gray,cv.COLOR_RGBA2GRAY);
  cv.GaussianBlur(gray,blur,new cv.Size(5,5),0);
  cv.Canny(blur,edge,50,150);
  const k=cv.Mat.ones(5,5,cv.CV_8U);
  cv.dilate(edge,edge,k);
  const contours=new cv.MatVector(),hier=new cv.Mat();
  cv.findContours(edge,contours,hier,cv.RETR_EXTERNAL,cv.CHAIN_APPROX_SIMPLE);
  const imgArea=small.cols*small.rows;
  let best=null,bestArea=0;
  for(let i=0;i<contours.size();i++){
    const c=contours.get(i);
    const peri=cv.arcLength(c,true);
    const approx=new cv.Mat();
    cv.approxPolyDP(c,approx,0.02*peri,true);
    if(approx.rows===4 && cv.isContourConvex(approx)){
      const area=Math.abs(cv.contourArea(approx));
      if(area>bestArea && area>imgArea*0.15){
        bestArea=area;
        const pts=[];
        for(let r=0;r<4;r++) pts.push({x:approx.data32S[r*2]/scale,y:approx.data32S[r*2+1]/scale});
        best=pts;
      }
    }
    approx.delete();c.delete();
  }
  src.delete();small.delete();gray.delete();blur.delete();edge.delete();k.delete();contours.delete();hier.delete();
  return best;
}

// 파일 → 자동 문서보정 캔버스(실패 시 null). 감지된 사각형도 함께 반환.
async function autoDocScan(file){
  await loadOpenCV();
  const img=await fileToImage(file);
  const quad=detectDocQuad(img);
  if(!quad) return null;
  return {canvas:warpToCanvas(img,quad),quad};
}

// SW 등록 + 자동 업데이트(새 버전 감지 시 적용 후 1회 새로고침)
if('serviceWorker' in navigator){
  let refreshing=false;
  // 새 워커가 제어권을 가져오면 한 번만 새로고침 → 최신 버전 즉시 반영
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(refreshing) return;
    refreshing=true;
    location.reload();
  });
  navigator.serviceWorker.register('sw.js').then(reg=>{
    // 페이지 열릴 때마다 업데이트 확인
    reg.update();
    reg.addEventListener('updatefound',()=>{
      const nw=reg.installing;
      if(!nw) return;
      nw.addEventListener('statechange',()=>{
        // 새 워커 설치 완료 + 기존 컨트롤러 존재 → 즉시 활성화 요청
        if(nw.state==='installed' && navigator.serviceWorker.controller){
          nw.postMessage('SKIP_WAITING');
        }
      });
    });
  });
  // 앱 복귀(백그라운드→포그라운드) 시에도 업데이트 확인
  document.addEventListener('visibilitychange',()=>{
    if(document.visibilityState==='visible')
      navigator.serviceWorker.getRegistration().then(r=>r&&r.update());
  });
}
